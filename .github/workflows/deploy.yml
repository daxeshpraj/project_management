name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_APP_DIR: /home/ubuntu/app2
  FRONTEND_BUILD_DIR: /home/ubuntu/frontend/build
  DEFAULT_PUBLIC_API_URL: http://65.1.93.48

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend (HK Tech)
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.PUBLIC_API_URL || 'http://65.1.93.48' }}
          CI: "false"

      - name: Upload frontend build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "frontend/build/*"
          target: /home/ubuntu/frontend/build
          strip_components: 2

      - name: Deploy backend and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd ${{ env.EC2_APP_DIR }}
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r backend/requirements.txt --quiet
            sudo systemctl restart myapp
            sudo systemctl restart nginx
            echo "Deploy complete."
