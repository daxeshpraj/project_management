name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_APP_DIR: /home/ubuntu/app2
  PUBLIC_API_URL: https://portal.hktech.in
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend (HK Tech)
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ env.PUBLIC_API_URL }}
          CI: "false"
        run: |
          npm ci
          npm run build
          test -f build/index.html

      - name: Archive frontend build
        run: tar -czf frontend-build.tar.gz -C frontend/build .

      - name: Upload build archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: frontend-build.tar.gz
          target: /home/ubuntu

      - name: Deploy backend and frontend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ubuntu/app2"
            BUILD_DIR="/home/ubuntu/frontend/build"

            echo "==> Deploy frontend"
            mkdir -p "$BUILD_DIR"
            rm -rf "$BUILD_DIR"/*
            tar -xzf /home/ubuntu/frontend-build.tar.gz -C "$BUILD_DIR"
            rm -f /home/ubuntu/frontend-build.tar.gz
            test -f "$BUILD_DIR/index.html"

            echo "==> Deploy backend code"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: $APP_DIR is not a git repo. Clone the repo there first."
              exit 1
            fi
            cd "$APP_DIR"
            git pull origin main

            if [ -f venv/bin/activate ]; then
              source venv/bin/activate
              pip install -r backend/requirements.txt --quiet
            else
              echo "WARNING: venv not found at $APP_DIR/venv"
            fi

            echo "==> Restart services"
            sudo systemctl restart myapp
            sudo systemctl restart nginx
            echo "Deploy complete."
